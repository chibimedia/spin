<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Gen Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2215%22 fill=%22%23333%22/><circle cx=%2250%22 cy=%2250%22 r=%225%22 fill=%22white%22/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { background-color: #0f172a; }
        .control-group { border-bottom: 1px solid #334155; padding-bottom: 1.25rem; margin-bottom: 1.25rem; }
        .btn-preset { @apply px-2 py-1 bg-slate-700 hover:bg-blue-600 rounded text-[10px] uppercase font-bold transition; }
        .btn-preset.active { @apply bg-blue-500 ring-2 ring-blue-300; }
        canvas { box-shadow: 0 20px 50px rgba(0,0,0,0.5); background-color: v-bind('state.bgColor'); }
        input[type=range] { @apply h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-0">
        
        <aside class="lg:col-span-3 h-screen overflow-y-auto bg-slate-900 p-6 border-r border-slate-800 custom-scrollbar">
            <header class="mb-8">
                <h1 class="text-2xl font-black tracking-tighter text-white flex items-center gap-2">
                    <span class="text-blue-500">VINYL</span>GEN <small class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded">2026</small>
                </h1>
            </header>

            <div class="control-group">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Assets</label>
                <div class="space-y-3">
                    <div>
                        <span class="text-xs mb-1 block">Vinyl Center (Img/GIF)</span>
                        <input type="file" id="vinylInput" accept="image/*" class="w-full text-xs bg-slate-800 p-1 rounded border border-slate-700">
                    </div>
                    <div>
                        <span class="text-xs mb-1 block">Background (Img/GIF/Vid)</span>
                        <input type="file" id="bgInput" accept="image/*,video/*" class="w-full text-xs bg-slate-800 p-1 rounded border border-slate-700">
                    </div>
                    <div>
                        <span class="text-xs mb-1 block">Audio (MP3)</span>
                        <input type="file" id="audioInput" accept="audio/mpeg" class="w-full text-xs bg-slate-800 p-1 rounded border border-slate-700">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Format</label>
                <div class="flex gap-2" id="ratioPresets">
                    <button data-ratio="1:1" class="btn-preset active">1:1</button>
                    <button data-ratio="9:16" class="btn-preset">9:16</button>
                    <button data-ratio="16:9" class="btn-preset">16:9</button>
                </div>
            </div>

            <div class="control-group">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Vinyl Settings</label>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Size</span><span id="sizeVal">70%</span></div>
                        <input type="range" id="vinylSize" min="10" max="100" value="70" class="w-full">
                    </div>
                    <div>
                        <span class="text-[10px] block mb-2 uppercase">Position</span>
                        <div class="grid grid-cols-3 gap-1" id="posPresets">
                            <button data-pos="tl" class="btn-preset text-[8px]">TL</button>
                            <button data-pos="tc" class="btn-preset text-[8px]">TC</button>
                            <button data-pos="tr" class="btn-preset text-[8px]">TR</button>
                            <button data-pos="ml" class="btn-preset text-[8px]">L</button>
                            <button data-pos="center" class="btn-preset active text-[8px]">Center</button>
                            <button data-pos="mr" class="btn-preset text-[8px]">R</button>
                            <button data-pos="bl" class="btn-preset text-[8px]">BL</button>
                            <button data-pos="bc" class="btn-preset text-[8px]">BC</button>
                            <button data-pos="br" class="btn-preset text-[8px]">BR</button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs">Counter-Clockwise</span>
                        <input type="checkbox" id="revToggle" class="w-4 h-4 accent-blue-500">
                    </div>
                </div>
            </div>

            <div class="control-group border-none">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-3">Background Settings</label>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs">Base Color</span>
                        <input type="color" id="bgColor" value="#000000" class="bg-transparent border-none w-8 h-8">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1"><span>Opacity</span><span id="opacityVal">100%</span></div>
                        <input type="range" id="bgOpacity" min="0" max="100" value="100" class="w-full">
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-4">
                <button id="exportBtn" disabled class="w-full py-4 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 disabled:text-slate-600 rounded-xl font-black text-sm uppercase tracking-tighter transition shadow-lg shadow-blue-900/20">
                    Generate Video
                </button>
                <div id="exportProgress" class="hidden mt-4 space-y-2">
                    <div class="flex justify-between text-[10px] font-bold uppercase"><span id="statusText">Processing...</span><span id="percentText">0%</span></div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all"></div>
                    </div>
                    <button id="cancelBtn" class="w-full text-[10px] font-bold text-red-400 uppercase pt-2">Cancel</button>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 flex flex-col items-center justify-center p-8 bg-slate-950/50 relative">
            <div class="mb-8 flex gap-4">
                <button id="playPauseBtn" disabled class="w-12 h-12 flex items-center justify-center bg-white text-black rounded-full hover:scale-105 transition disabled:opacity-20">
                    <svg id="playIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="hidden w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>

            <div class="relative group">
                <canvas id="mainCanvas" width="720" height="720" class="max-w-full h-auto rounded-sm outline outline-1 outline-white/10"></canvas>
            </div>

            <div class="w-full max-w-2xl mt-8 space-y-2">
                <input type="range" id="seekBar" value="0" step="0.01" class="w-full accent-blue-500">
                <div class="flex justify-between font-mono text-[10px] text-slate-500">
                    <span id="timeCur">00:00</span>
                    <span id="timeTot">00:00</span>
                </div>
            </div>

            <div id="hiddenAssets" class="hidden"></div>
        </main>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // --- State Management ---
        const state = {
            width: 720, height: 720,
            ratio: '1:1',
            vinylScale: 0.7,
            vinylPos: 'center',
            revRotation: false,
            bgColor: '#000000',
            bgOpacity: 1.0,
            
            audioBuffer: null,
            audioCtx: null,
            sourceNode: null,
            startTime: 0,
            pausedAt: 0,
            isPlaying: false,

            vinylAsset: null, // HTMLImg or HTMLVid
            bgAsset: null,    // HTMLImg or HTMLVid
            isStatic: true,   // True if no videos present
            
            ffmpeg: null,
            isExporting: false,
            shouldCancel: false
        };

        // --- Core Drawing Logic ---
        function drawFrame(time) {
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Background
            if (state.bgAsset) {
                ctx.save();
                ctx.globalAlpha = state.bgOpacity;
                const asset = state.bgAsset;
                // Video frame update if applicable
                if (asset.tagName === 'VIDEO') asset.currentTime = time % asset.duration;
                
                const scale = Math.max(canvas.width / asset.width || 1, canvas.height / asset.height || 1);
                const w = (asset.width || asset.videoWidth) * scale;
                const h = (asset.height || asset.videoHeight) * scale;
                ctx.drawImage(asset, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
                ctx.restore();
            }

            // 2. Draw Vinyl
            const baseRPM = 30;
            const degPerSec = baseRPM * 6;
            let angle = (time * degPerSec) % 360;
            if (state.revRotation) angle = -angle;

            const vinylDim = Math.min(canvas.width, canvas.height) * state.vinylScale;
            let vx = canvas.width / 2, vy = canvas.height / 2;

            // Position presets
            const pad = vinylDim / 2;
            if (state.vinylPos === 'tl') { vx = pad; vy = pad; }
            else if (state.vinylPos === 'tc') { vy = pad; }
            else if (state.vinylPos === 'tr') { vx = canvas.width - pad; vy = pad; }
            else if (state.vinylPos === 'ml') { vx = pad; }
            else if (state.vinylPos === 'mr') { vx = canvas.width - pad; }
            else if (state.vinylPos === 'bl') { vx = pad; vy = canvas.height - pad; }
            else if (state.vinylPos === 'bc') { vy = canvas.height - pad; }
            else if (state.vinylPos === 'br') { vx = canvas.width - pad; vy = canvas.height - pad; }

            ctx.save();
            ctx.translate(vx, vy);
            ctx.rotate(angle * Math.PI / 180);
            
            // Mask for vinyl
            ctx.beginPath();
            ctx.arc(0, 0, vinylDim / 2, 0, Math.PI * 2);
            ctx.clip();

            if (state.vinylAsset) {
                if (state.vinylAsset.tagName === 'VIDEO') state.vinylAsset.currentTime = time % state.vinylAsset.duration;
                ctx.drawImage(state.vinylAsset, -vinylDim/2, -vinylDim/2, vinylDim, vinylDim);
            } else {
                ctx.fillStyle = '#111';
                ctx.fill();
            }
            ctx.restore();

            // 3. Center Hole (Static)
            ctx.beginPath();
            ctx.arc(vx, vy, vinylDim * 0.05, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
        }

        // --- Asset Handling ---
        async function loadAsset(file) {
            const isVideo = file.type.startsWith('video');
            const url = URL.createObjectURL(file);
            if (isVideo) {
                state.isStatic = false;
                const vid = document.createElement('video');
                vid.src = url;
                vid.muted = true;
                vid.loop = true;
                await new Promise(r => vid.onloadeddata = r);
                return vid;
            } else {
                const img = new Image();
                img.src = url;
                await new Promise(r => img.onload = r);
                return img;
            }
        }

        document.getElementById('vinylInput').onchange = async (e) => {
            state.vinylAsset = await loadAsset(e.target.files[0]);
            drawFrame(state.pausedAt);
        };

        document.getElementById('bgInput').onchange = async (e) => {
            state.bgAsset = await loadAsset(e.target.files[0]);
            drawFrame(state.pausedAt);
        };

        document.getElementById('audioInput').onchange = async (e) => {
            const file = e.target.files[0];
            state.audioFile = file;
            state.audioCtx = state.audioCtx || new AudioContext();
            state.audioBuffer = await state.audioCtx.decodeAudioData(await file.arrayBuffer());
            document.getElementById('playPauseBtn').disabled = false;
            document.getElementById('exportBtn').disabled = false;
            document.getElementById('timeTot').textContent = formatTime(state.audioBuffer.duration);
            document.getElementById('seekBar').max = state.audioBuffer.duration;
        };

        // --- UI Events ---
        document.getElementById('ratioPresets').onclick = (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            state.ratio = btn.dataset.ratio;
            document.querySelectorAll('#ratioPresets button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (state.ratio === '1:1') { canvas.width = 720; canvas.height = 720; }
            else if (state.ratio === '9:16') { canvas.width = 405; canvas.height = 720; }
            else if (state.ratio === '16:9') { canvas.width = 1280; canvas.height = 720; }
            drawFrame(state.pausedAt);
        };

        document.getElementById('posPresets').onclick = (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            state.vinylPos = btn.dataset.pos;
            document.querySelectorAll('#posPresets button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            drawFrame(state.pausedAt);
        };

        document.getElementById('vinylSize').oninput = (e) => {
            state.vinylScale = e.target.value / 100;
            document.getElementById('sizeVal').textContent = e.target.value + '%';
            drawFrame(state.pausedAt);
        };

        document.getElementById('bgOpacity').oninput = (e) => {
            state.bgOpacity = e.target.value / 100;
            document.getElementById('opacityVal').textContent = e.target.value + '%';
            drawFrame(state.pausedAt);
        };

        document.getElementById('bgColor').oninput = (e) => {
            state.bgColor = e.target.value;
            drawFrame(state.pausedAt);
        };

        document.getElementById('revToggle').onchange = (e) => {
            state.revRotation = e.target.checked;
            drawFrame(state.pausedAt);
        };

        // --- Playback Logic ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const seekBar = document.getElementById('seekBar');

        function togglePlay() {
            if (state.isPlaying) {
                state.sourceNode.stop();
                state.pausedAt = state.audioCtx.currentTime - state.startTime;
                state.isPlaying = false;
                toggleIcons(false);
            } else {
                state.audioCtx.resume();
                state.sourceNode = state.audioCtx.createBufferSource();
                state.sourceNode.buffer = state.audioBuffer;
                state.sourceNode.connect(state.audioCtx.destination);
                state.sourceNode.start(0, state.pausedAt);
                state.startTime = state.audioCtx.currentTime - state.pausedAt;
                state.isPlaying = true;
                toggleIcons(true);
                requestAnimationFrame(playbackLoop);
            }
        }

        function toggleIcons(playing) {
            document.getElementById('playIcon').classList.toggle('hidden', playing);
            document.getElementById('pauseIcon').classList.toggle('hidden', !playing);
        }

        function playbackLoop() {
            if (!state.isPlaying || state.isExporting) return;
            const now = state.audioCtx.currentTime - state.startTime;
            if (now >= state.audioBuffer.duration) {
                state.isPlaying = false;
                state.pausedAt = 0;
                toggleIcons(false);
                return;
            }
            seekBar.value = now;
            document.getElementById('timeCur').textContent = formatTime(now);
            drawFrame(now);
            requestAnimationFrame(playbackLoop);
        }

        seekBar.oninput = (e) => {
            const wasPlaying = state.isPlaying;
            if (wasPlaying) togglePlay();
            state.pausedAt = parseFloat(e.target.value);
            document.getElementById('timeCur').textContent = formatTime(state.pausedAt);
            drawFrame(state.pausedAt);
        };

        playPauseBtn.onclick = togglePlay;

        // --- Export Engine ---
        document.getElementById('exportBtn').onclick = async () => {
            if (state.isPlaying) togglePlay();
            state.isExporting = true;
            state.shouldCancel = false;
            
            const exportArea = document.getElementById('exportProgress');
            const pBar = document.getElementById('progressBar');
            const pText = document.getElementById('percentText');
            const sText = document.getElementById('statusText');
            
            exportArea.classList.remove('hidden');
            document.getElementById('exportBtn').disabled = true;

            try {
                if (!state.ffmpeg) {
                    state.ffmpeg = createFFmpeg({ log: false });
                    await state.ffmpeg.load();
                }

                const fps = 24;
                // Optimization: If static, only 1 full rotation (2s at 30rpm)
                const loopDuration = 2.0; 
                const renderDuration = state.isStatic ? loopDuration : state.audioBuffer.duration;
                const totalFrames = Math.floor(renderDuration * fps);

                for (let i = 0; i < totalFrames; i++) {
                    if (state.shouldCancel) throw new Error("Cancelled");
                    const t = i / fps;
                    drawFrame(t);
                    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
                    state.ffmpeg.FS('writeFile', `f_${i.toString().padStart(5,'0')}.jpg`, await fetchFile(blob));
                    
                    pBar.style.width = ((i / totalFrames) * 100) + '%';
                    pText.textContent = Math.round((i / totalFrames) * 100) + '%';
                    sText.textContent = `Rendering ${i}/${totalFrames}`;
                }

                sText.textContent = "Finalizing...";
                state.ffmpeg.FS('writeFile', 'audio.mp3', await fetchFile(state.audioFile));

                const loopArgs = state.isStatic ? ['-stream_loop', '-1'] : [];

                await state.ffmpeg.run(
                    '-framerate', String(fps),
                    ...loopArgs,
                    '-i', 'f_%05d.jpg',
                    '-i', 'audio.mp3',
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-pix_fmt', 'yuv420p',
                    '-shortest',
                    'out.mp4'
                );

                const data = state.ffmpeg.FS('readFile', 'out.mp4');
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                link.download = 'vinyl_export.mp4';
                link.click();

            } catch (e) {
                console.error(e);
                alert(e.message === "Cancelled" ? "Export Cancelled" : "Error during export");
            } finally {
                state.isExporting = false;
                exportArea.classList.add('hidden');
                document.getElementById('exportBtn').disabled = false;
            }
        };

        document.getElementById('cancelBtn').onclick = () => state.shouldCancel = true;

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        // Init
        drawFrame(0);

    </script>
</body>
</html>
